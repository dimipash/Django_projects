<h1>This is a chatroom {{ chat_room.name }}!</h1>
{{ chat_room.slug|json_script:"chatroomname" }}
<form method="post">
    {% csrf_token %}
    <input
        type="text"
        name="message"
        placeholder="Type your message here...d"
    />
    <button type="submit">Send</button>
</form>
<script>
    const chatRoomName = JSON.parse(
        document.getElementById("chatroomname").textContent,
    );
    const chatSocket = new WebSocket(
        `ws://` + window.location.host + `/ws/` + chatRoomName + `/`,
    );
    chatSocket.onmessage = function (e) {
        console.log("This is a message");
    };
    chatSocket.onclose = function (e) {
        console.log("This is a close");
    };
</script>
